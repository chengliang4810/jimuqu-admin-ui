name: Release

on:
  push:
    branches:
      - dev

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: Calculate release version
        run: echo "RELEASE_VERSION=v$(TZ=Asia/Shanghai date +%Y.%m.%d)-${GITHUB_SHA:0:7}" >> "$GITHUB_ENV"

      - name: Install and build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Prepare release assets
        run: |
          mkdir release
          tar -czf release/jimuqu-admin-ui-dist.tar.gz -C dist .
          (cd dist && zip -qr ../release/jimuqu-admin-ui-dist.zip .)
          git archive --format=zip --prefix=jimuqu-admin-ui/ -o release/jimuqu-admin-ui-source.zip HEAD
          git archive --format=tar.gz --prefix=jimuqu-admin-ui/ -o release/jimuqu-admin-ui-source.tar.gz HEAD
          cd release
          sha256sum * > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          target_commitish: dev
          generate_release_notes: true
          files: release/*
